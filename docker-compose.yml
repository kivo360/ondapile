services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ondapile:
    build: .
    ports:
      - "8080:8080"
    environment:
      ONDAPILE_API_KEY: ${ONDAPILE_API_KEY:-ond_sk_dev_change_me_in_production}
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: kevinhill
      DB_PASSWORD: ""
      DB_NAME: ondapile
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WA_DEVICE_STORE_PATH: ./devices
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - devices:/app/devices
    restart: unless-stopped

volumes:
  devices:
